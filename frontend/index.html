<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Customer Churn Predictor
    </title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="container">

        <h1>
            Customer Churn Prediction
        </h1>

        <div class="card">

            <form id="predictionForm">

                <input type="number"
                       id="tenure"
                       placeholder="Tenure"
                       required>

                <input type="number"
                       id="monthlyCharges"
                       placeholder="Monthly Charges"
                       required>

                <input type="number"
                       id="totalCharges"
                       placeholder="Total Charges"
                       required>

                <select id="contract">

                    <option value="Month-to-month">
                        Month-to-month
                    </option>

                    <option value="One year">
                        One year
                    </option>

                    <option value="Two year">
                        Two year
                    </option>

                </select>

                <button type="submit">
                    Predict
                </button>

            </form>

            <div id="result"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
